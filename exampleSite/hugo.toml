baseURL = ""
languageCode = "en"
title = "Shizuka Demo"
theme = "shizuka"
paginate = 5

[author]
  name = "Your Name"
  email = "you@example.com"  # can be omitted, but adding it avoids the rss.xml lookup issue

[params]
  description = "A minimal, clean Hugo blog theme inspired by the Japanese aesthetic of shibui."
  author = "Your Name"
  keywords = ["blog", "minimal"]
  ogImage = "/images/og-default.png"
  rssLimit = 20
  dateFormat = "January 2, 2006"
  github = "https://github.com/yourusername"
  website = "https://yourwebsite.com"
  tagline = "Slow writing, clear thinking."

[outputs]
  home = ["HTML"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    lineNos = false
    style = "monokailight"
    noClasses = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[menu]
  [[menu.main]]
    name = "Blog"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "Archive"
    url = "/archive/"
    weight = 2
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 3

[sitemap]
  changefreq = "weekly"
  priority = 0.5
